<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Page Not Found</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; text-align: center; padding: 50px; }
        .error-container { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 30px; display: inline-block; }
        h1 { color: #dc3545; }
        a { text-decoration: none; color: #007bff; }
        a:hover { text-decoration: underline; }

</head>
<body>
<div class="error-container">
    <h1>404 - Page Not Found</h1>
    <p>आप जिस पेज को ढूंढ रहे हैं, वह मौजूद नहीं है।</p>
    <p><a th:href="@{/home}">Home Page</a> पर वापस जाएं।</p>
</div>
</body>
</html>
